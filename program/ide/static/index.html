<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Compiscript IDE</title>
<style>
  :root {
    --bg: #1e1e2e; --panel: #27273a; --border: #3b3b52;
    --text: #e6e6f0; --dim: #9a9ab0; --accent: #7aa2f7;
    --ok: #9ece6a; --err: #f7768e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", Helvetica, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .sub { color: var(--dim); font-size: 12px; }
  button {
    background: var(--accent); color: #16161e; border: none;
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer;
  }
  button.secondary { background: var(--border); color: var(--text); }
  button:disabled { opacity: .5; cursor: wait; }
  main { flex: 1; display: flex; min-height: 0; }
  .col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .col + .col { border-left: 1px solid var(--border); }
  .paneltitle {
    padding: 6px 12px; font-size: 11px; letter-spacing: .08em;
    text-transform: uppercase; color: var(--dim);
    background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  textarea, pre {
    flex: 1; margin: 0; padding: 12px; border: none; resize: none;
    background: var(--bg); color: var(--text);
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px; line-height: 1.5; overflow: auto;
    white-space: pre; outline: none;
  }
  #status { font-size: 12px; margin-left: auto; }
  #status.ok { color: var(--ok); }
  #status.err { color: var(--err); }
  #errors { color: var(--err); max-height: 30%; display: none; }
  .tabs { display: flex; gap: 2px; }
  .tabs button {
    background: transparent; color: var(--dim); font-weight: 500;
    padding: 3px 10px; border-radius: 4px; font-size: 11px;
  }
  .tabs button.active { background: var(--border); color: var(--text); }
</style>
</head>
<body>
<header>
  <h1>Compiscript IDE</h1>
  <span class="sub">fuente .cps &rarr; TAC &rarr; MIPS</span>
  <button id="btn-compile">Compilar</button>
  <button id="btn-run" class="secondary">Compilar y ejecutar</button>
  <button id="btn-save" class="secondary">Descargar .asm</button>
  <span id="status"></span>
</header>
<main>
  <div class="col">
    <div class="paneltitle">editor (codigo Compiscript)</div>
    <textarea id="source" spellcheck="false">// Escribe tu programa Compiscript aqui
function factorial(n: integer): integer {
  if (n <= 1) { return 1; }
  return n * factorial(n - 1);
}

for (let i: integer = 1; i <= 5; i = i + 1) {
  print(i + "! = " + factorial(i));
}
</textarea>
    <pre id="errors"></pre>
  </div>
  <div class="col">
    <div class="paneltitle">
      <span id="out-title">salida</span>
      <span class="tabs">
        <button data-tab="mips" class="active">MIPS</button>
        <button data-tab="tac">TAC</button>
        <button data-tab="output">Ejecucion</button>
      </span>
    </div>
    <pre id="out"></pre>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
let results = { mips: '', tac: '', output: '' };
let activeTab = 'mips';

function render() {
  $('out').textContent = results[activeTab] ||
    (activeTab === 'output' ? '(usa "Compilar y ejecutar")' : '');
}

document.querySelectorAll('.tabs button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeTab = b.dataset.tab;
    render();
  };
});

async function compile(run) {
  const btns = [$('btn-compile'), $('btn-run')];
  btns.forEach(b => b.disabled = true);
  $('status').textContent = 'compilando...';
  $('status').className = '';
  try {
    const res = await fetch(run ? '/run' : '/compile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: $('source').value })
    });
    const data = await res.json();
    results.tac = data.tac;
    results.mips = data.mips;
    results.output = data.output || '';
    if (data.ok) {
      $('errors').style.display = 'none';
      $('status').textContent = run ? 'compilado y ejecutado' : 'compilacion exitosa';
      $('status').className = 'ok';
      if (run) {
        activeTab = 'output';
        document.querySelectorAll('.tabs button').forEach(x =>
          x.classList.toggle('active', x.dataset.tab === 'output'));
      }
    } else {
      $('errors').style.display = 'block';
      $('errors').textContent = data.errors.join('\n');
      $('status').textContent = data.errors.length + ' error(es)';
      $('status').className = 'err';
    }
    render();
  } catch (e) {
    $('status').textContent = 'error de conexion con el servidor';
    $('status').className = 'err';
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

$('btn-compile').onclick = () => compile(false);
$('btn-run').onclick = () => compile(true);
$('btn-save').onclick = () => {
  if (!results.mips) { alert('Primero compila el programa.'); return; }
  const blob = new Blob([results.mips], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'programa.asm';
  a.click();
  URL.revokeObjectURL(a.href);
};

// atajo: Cmd/Ctrl + Enter compila
$('source').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') compile(false);
});
</script>
</body>
</html>
